services:
  wireguard-server:
    build: .
    container_name: wireguard-server
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./config:/etc/wireguard
      - /lib/modules:/lib/modules # Needed for WireGuard kernel module access
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
    # Run with host networking if you want to avoid NAT complexities
    # network_mode: host
